site_name: Project H — Documentation
site_description: Engineering documentation for Project H, a precision-psychiatry SaaS platform integrating with EPIC EHR
site_url: https://andreidzemianchyk.github.io/ai-doc-sample/
repo_url: https://github.com/andreidzemianchyk/ai-doc-sample
repo_name: andreidzemianchyk/ai-doc-sample
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
      - Diagrams:
          - C4 L1 — System Context: architecture/diagrams/c4-l1-system-context.md
          - C4 L2 — Container view: architecture/diagrams/c4-l2-container.md
          - C4 L3 — Mobile App Backend: architecture/diagrams/c4-l3-mobile-backend.md
          - C4 L3 — Authorization Service: architecture/diagrams/c4-l3-authorization-service.md
          - Deployment view (MVP): architecture/diagrams/deployment-mvp.md
      - Integration points: architecture/integration-points.md
      - Release coexistence: architecture/release-coexistence.md
      - Data flows:
          - Patient onboarding: architecture/data-flows/patient-onboarding.md
          - Report to clinician: architecture/data-flows/report-to-clinician.md
      - Decisions:
          - ADR-0001 MyChart as per-clinic SSO: architecture/decisions/0001-mychart-as-per-clinic-sso.md
          - ADR-0002 Components initialization (dev): architecture/decisions/0002-components-initialization-dev-environment.md
          - ADR-0003 Backup code validation endpoint: architecture/decisions/0003-backup-code-validation-endpoint.md
          - ADR-0004 Tokens management: architecture/decisions/0004-tokens-management.md
          - ADR-0005 Biometric login: architecture/decisions/0005-biometric-login.md
          - ADR-0006 Dashboard endpoint: architecture/decisions/0006-dashboard-endpoint.md
          - ADR-0007 FDB integration: architecture/decisions/0007-fdb-integration.md
          - ADR-0008 Legacy assessment template uploading: architecture/decisions/0008-legacy-assessment-template-uploading.md
          - ADR-0009 Reference data: architecture/decisions/0009-reference-data.md
          - ADR-0010 Backend logging convention: architecture/decisions/0010-logging.md
          - ADR-0012 Data retention: architecture/decisions/0012-data-retention.md
          - ADR-0013 PDF report → EPIC HL7: architecture/decisions/0013-pdf-report-to-epic-hl7.md
          - ADR-0014 Mirth Connect deployment: architecture/decisions/0014-mirth-connect-deployment.md
          - ADR-0015 Sentry mobile error logging: architecture/decisions/0015-sentry-mobile-error-logging.md
          - ADR-0016 Audit log: architecture/decisions/0016-audit-log.md
          - ADR-0017 EPIC SMART FHIR production config: architecture/decisions/0017-epic-smart-fhir-production-config.md
          - ADR-0018 Consistency of production releases: architecture/decisions/0018-consistency-of-production-releases.md
          - ADR-0019 Internal token for EPIC flow: architecture/decisions/0019-internal-token-epic-flow.md
          - ADR-0020 Clinician management: architecture/decisions/0020-clinician-management.md
          - ADR-0021 Deferred Deep Link: architecture/decisions/0021-deferred-deep-link.md
          - ADR-0022 Follow-up flow: architecture/decisions/0022-follow-up-flow.md
          - ADR-0023 Django static → S3 + CloudFront: architecture/decisions/0023-django-static-s3-cloudfront.md
          - ADR-0024 Merge policies: architecture/decisions/0024-merge-policies.md
  - Schema:
      - Overview: schema/overview.md
      - Relationships: schema/relationships.md
      - Naming inconsistencies: schema/naming-inconsistencies.md
      - Tables:
          - Patient profile: schema/tables/patient-profile.md
  - Modules:
      - Auth & Authorization:
          - Overview: modules/auth-authorization/overview.md
          - Business rules: modules/auth-authorization/business-rules.md
          - Variations (EPIC vs non-EPIC): modules/auth-authorization/variations.md
  - Conventions: CONVENTIONS.md
  - Glossary: GLOSSARY.md
  - AI entry points:
      - Root CLAUDE.md: CLAUDE.md
      - Root AGENTS.md: AGENTS.md
      - Module CLAUDE.md: modules/auth-authorization/CLAUDE.md

# Methodology-evidence logs (cross-LLM review template, AI-readability test
# battery) live under internal/review/ in the repo. They are process artefacts
# for an internal reader (delivery lead, Tech Lead, auditor) and intentionally
# do NOT ship with the published site. exclude_docs below also keeps any
# leftover files under docs/_review/ out of the build until they are removed
# from the working tree.
exclude_docs: |
  _review/
  companion/
  architecture/decisions/0002-mermaid-for-inline-diagrams.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mermaid.mjs
  - javascripts/extra.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/andreidzemianchyk
